<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos con DOM HTML</title>
</head>
<body>
    <h1 id="titulo" onmouseout="noColorin(this)" onmouseover="colorin(this)">Hola mundo</h1>
    <br/>
    Nombre: <input type="text" id="nombre" onchange="convertir(this)"/>
    <script>
        function colorin(titulo){
            titulo.style.color = "red";
        }

        function noColorin(parametro){
            parametro.style.color = "black";
        }
    </script>
</body>
</html>
