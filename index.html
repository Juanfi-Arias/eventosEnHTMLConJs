<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos con DOM HTML</title>
</head>
<body>
    <h1 id="titulo" onmouseout="noColorin(this)" onmouseover="colorin(this)">Hola mundo</h1>
    <br/>
    Nombre: <input type="text" onblur="regresar(this)" onfocus="cambiar(this)"/>
    <br/><br/>
    Apellido: <input type="text" onblur="regresar(this)" onfocus="cambiar(this)"/>
    <script>
        function cambiar(elemtoInput){
            elemtoInput.style.background = 'yellow';
        }

        function regresar(elemtoInput){
            elemtoInput.style.background = 'white';
        }
    </script>
</body>
</html>
